<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,system-ui);background:transparent;color:var(--color-text-primary)}
#app{display:flex;flex-direction:column;min-height:600px;padding:1rem}
#screen-idle,#screen-workout,#screen-history{display:none;flex-direction:column;gap:1rem}
#screen-idle{display:flex}

.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg,12px);padding:1rem 1.25rem}

.stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md,8px);padding:0.85rem;text-align:center}
.stat-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:500}

.btn-primary{width:100%;padding:14px;border-radius:var(--border-radius-lg,12px);border:none;background:#1a1a1a;color:#fff;font-size:16px;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.85}
.btn-secondary{width:100%;padding:12px;border-radius:var(--border-radius-lg,12px);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);font-size:15px;cursor:pointer;transition:background .15s}
.btn-secondary:hover{background:var(--color-background-secondary)}

#video-wrap{position:relative;border-radius:var(--border-radius-lg,12px);overflow:hidden;background:#000;aspect-ratio:3/4}
video{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1)}
#overlay-canvas{position:absolute;inset:0;width:100%;height:100%;transform:scaleX(-1)}
#face-status{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);color:#fff;font-size:12px;padding:4px 12px;border-radius:20px;white-space:nowrap}

#rep-counter{font-size:72px;font-weight:500;text-align:center;line-height:1}
#rep-label{font-size:13px;color:var(--color-text-secondary);text-align:center;margin-top:2px}

.phase-bar{height:6px;border-radius:3px;background:var(--color-background-secondary);overflow:hidden;margin-top:8px}
.phase-fill{height:100%;border-radius:3px;background:#1a1a1a;transition:width .1s}

.hist-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.hist-item:last-child{border-bottom:none}
.hist-date{font-size:13px;color:var(--color-text-secondary)}
.hist-reps{font-size:15px;font-weight:500}

.tab-row{display:flex;gap:8px;margin-bottom:.5rem}
.tab{flex:1;padding:8px;border-radius:var(--border-radius-md,8px);border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);font-size:13px;cursor:pointer}
.tab.active{background:var(--color-background-primary);color:var(--color-text-primary);border-color:var(--color-border-primary);font-weight:500}

#sensitivity-wrap{display:flex;align-items:center;gap:10px;margin-top:.5rem}
#sensitivity-wrap label{font-size:13px;color:var(--color-text-secondary);white-space:nowrap}
#sensitivity-wrap input{flex:1}
#sensitivity-wrap span{font-size:13px;font-weight:500;min-width:20px;text-align:right}
</style>
</head>
<body>
<div id="app">
<h2 class="sr-only">Push-up tracker using front camera face detection</h2>

<div id="screen-idle">
  <div style="padding:.5rem 0">
    <p style="font-size:22px;font-weight:500">push.</p>
    <p style="font-size:14px;color:var(--color-text-secondary);margin-top:2px">place your phone flat, face down</p>
  </div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">today</div><div class="stat-val" id="today-total">0</div></div>
    <div class="stat-card"><div class="stat-label">all time</div><div class="stat-val" id="alltime-total">0</div></div>
    <div class="stat-card"><div class="stat-label">best set</div><div class="stat-val" id="best-set">0</div></div>
    <div class="stat-card"><div class="stat-label">streak</div><div class="stat-val" id="streak-val">0<span style="font-size:14px">d</span></div></div>
  </div>
  <button class="btn-primary" onclick="startWorkout()">start workout</button>
  <button class="btn-secondary" onclick="showHistory()">history</button>
  <div class="card" style="margin-top:.25rem">
    <p style="font-size:13px;font-weight:500;margin-bottom:.5rem">tracking sensitivity</p>
    <div id="sensitivity-wrap">
      <label>low</label>
      <input type="range" id="sens-slider" min="1" max="5" step="1" value="3" oninput="document.getElementById('sens-val').textContent=this.value">
      <label>high</label>
      <span id="sens-val">3</span>
    </div>
    <p style="font-size:12px;color:var(--color-text-secondary);margin-top:8px">higher = counts more reps at shallower angles</p>
  </div>
</div>

<div id="screen-workout">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <p style="font-size:13px;color:var(--color-text-secondary)" id="set-label">set 1</p>
    <button class="tab" style="width:auto;padding:6px 14px" onclick="endSet()">rest</button>
  </div>
  <div id="video-wrap">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="overlay-canvas"></canvas>
    <div id="face-status">searching for face…</div>
  </div>
  <div style="text-align:center;padding:.5rem 0">
    <div id="rep-counter">0</div>
    <div id="rep-label">reps this set</div>
    <div class="phase-bar"><div class="phase-fill" id="phase-fill" style="width:50%"></div></div>
  </div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">total today</div><div class="stat-val" id="w-total">0</div></div>
    <div class="stat-card"><div class="stat-label">sets</div><div class="stat-val" id="w-sets">1</div></div>
  </div>
  <button class="btn-primary" onclick="finishWorkout()">finish workout</button>
</div>

<div id="screen-history">
  <div style="display:flex;align-items:center;gap:10px">
    <button class="tab" style="width:auto;padding:6px 14px" onclick="showIdle()">← back</button>
    <p style="font-size:16px;font-weight:500">history</p>
  </div>
  <div class="tab-row">
    <button class="tab active" onclick="filterHistory('all',this)">all</button>
    <button class="tab" onclick="filterHistory('week',this)">this week</button>
    <button class="tab" onclick="filterHistory('month',this)">this month</button>
  </div>
  <div class="card" id="hist-list"><p style="font-size:14px;color:var(--color-text-secondary)">no workouts yet</p></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script>
let history = [];
let currentReps = 0, currentSet = 1, sessionReps = 0;
let faceMesh, camera, videoEl, canvasEl, ctx;
let isTracking = false;
let lastNoseY = null, lastNoseSize = null;
let phase = 'up'; // 'up' or 'down'
let downThreshold, upThreshold;
let faceDetected = false;
let calibrationFrames = 0, calibrationSum = 0, calibratedBase = null;

const STORAGE_KEY = 'pushr_history_v1';

function loadHistory() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    history = raw ? JSON.parse(raw) : [];
  } catch(e) { history = []; }
}

function saveHistory() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); } catch(e) {}
}

function getToday() { return new Date().toISOString().slice(0,10); }

function updateIdleStats() {
  const today = getToday();
  const todayEntries = history.filter(h => h.date === today);
  const todaySum = todayEntries.reduce((a,h) => a+h.reps, 0);
  const allTime = history.reduce((a,h) => a+h.reps, 0);
  const bestSet = history.reduce((a,h) => Math.max(a, h.reps), 0);

  let streak = 0;
  const days = new Set(history.map(h=>h.date));
  let d = new Date();
  while(true) {
    const k = d.toISOString().slice(0,10);
    if(days.has(k)) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }

  document.getElementById('today-total').textContent = todaySum;
  document.getElementById('alltime-total').textContent = allTime;
  document.getElementById('best-set').textContent = bestSet;
  document.getElementById('streak-val').innerHTML = streak+'<span style="font-size:14px">d</span>';
}

function showIdle() {
  hide('screen-workout'); hide('screen-history');
  show('screen-idle');
  stopCamera();
  updateIdleStats();
}

function showHistory() {
  hide('screen-idle');
  show('screen-history');
  renderHistory('all');
}

function renderHistory(filter) {
  const today = new Date();
  const list = document.getElementById('hist-list');
  let entries = [...history].reverse();
  if(filter === 'week') {
    const wAgo = new Date(today); wAgo.setDate(wAgo.getDate()-7);
    entries = entries.filter(h => new Date(h.date) >= wAgo);
  } else if(filter === 'month') {
    const mAgo = new Date(today); mAgo.setDate(mAgo.getDate()-30);
    entries = entries.filter(h => new Date(h.date) >= mAgo);
  }
  if(!entries.length) { list.innerHTML = '<p style="font-size:14px;color:var(--color-text-secondary)">no workouts in this range</p>'; return; }
  list.innerHTML = entries.map(h => `
    <div class="hist-item">
      <div>
        <div class="hist-reps">${h.reps} reps</div>
        <div class="hist-date">${h.date} · set ${h.set}</div>
      </div>
      <i class="ti ti-activity" aria-hidden="true" style="font-size:18px;color:var(--color-text-secondary)"></i>
    </div>
  `).join('');
}

function filterHistory(f, btn) {
  document.querySelectorAll('.tab-row .tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderHistory(f);
}

function show(id){ document.getElementById(id).style.display='flex'; }
function hide(id){ document.getElementById(id).style.display='none'; }

async function startWorkout() {
  hide('screen-idle');
  show('screen-workout');
  currentReps = 0; currentSet = 1; sessionReps = 0;
  updateWorkoutUI();
  await initCamera();
}

function updateWorkoutUI() {
  document.getElementById('rep-counter').textContent = currentReps;
  document.getElementById('set-label').textContent = 'set ' + currentSet;
  document.getElementById('w-total').textContent = sessionReps;
  document.getElementById('w-sets').textContent = currentSet;
}

function endSet() {
  if(currentReps > 0) {
    history.push({ date: getToday(), set: currentSet, reps: currentReps });
    saveHistory();
    sessionReps += currentReps;
  }
  currentSet++;
  currentReps = 0;
  calibratedBase = null; calibrationFrames = 0; calibrationSum = 0;
  phase = 'up';
  updateWorkoutUI();
}

function finishWorkout() {
  if(currentReps > 0) {
    history.push({ date: getToday(), set: currentSet, reps: currentReps });
    saveHistory();
  }
  stopCamera();
  showIdle();
}

async function initCamera() {
  videoEl = document.getElementById('video');
  canvasEl = document.getElementById('overlay-canvas');
  ctx = canvasEl.getContext('2d');

  const fm = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
  fm.setOptions({ maxNumFaces:1, refineLandmarks:false, minDetectionConfidence:0.5, minTrackingConfidence:0.5 });
  fm.onResults(onResults);
  faceMesh = fm;

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode:'user', width:640, height:480 }, audio:false });
    videoEl.srcObject = stream;
    videoEl.onloadedmetadata = () => {
      canvasEl.width = videoEl.videoWidth;
      canvasEl.height = videoEl.videoHeight;
      isTracking = true;
      processFrame();
    };
  } catch(e) {
    document.getElementById('face-status').textContent = 'camera permission denied';
  }
}

function stopCamera() {
  isTracking = false;
  if(videoEl && videoEl.srcObject) {
    videoEl.srcObject.getTracks().forEach(t => t.stop());
    videoEl.srcObject = null;
  }
}

async function processFrame() {
  if(!isTracking) return;
  if(videoEl.readyState >= 2) await faceMesh.send({ image: videoEl });
  requestAnimationFrame(processFrame);
}

function getSensitivity() {
  const v = parseInt(document.getElementById('sens-slider').value);
  // Map 1-5 to threshold multiplier: lower sensitivity = need more movement
  return 0.04 + (v - 1) * 0.012;
}

function onResults(results) {
  if(!ctx || !canvasEl) return;
  ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);

  const statusEl = document.getElementById('face-status');

  if(!results.multiFaceLandmarks || !results.multiFaceLandmarks.length) {
    faceDetected = false;
    statusEl.textContent = 'no face detected — look at camera';
    return;
  }

  faceDetected = true;
  const lm = results.multiFaceLandmarks[0];

  // Use nose tip (1) and forehead (10) to get face size + vertical position
  const nose = lm[1];
  const forehead = lm[10];
  const chin = lm[152];

  // Face "size" = vertical span (angle-robust depth proxy)
  const faceHeight = Math.abs(chin.y - forehead.y);

  // Use nose Z for depth if available (more accurate for angle tolerance)
  const depthProxy = nose.z !== undefined ? nose.z : nose.y;

  // Calibration: first 20 frames establish baseline (up position)
  if(calibratedBase === null) {
    if(calibrationFrames < 20) {
      calibrationSum += faceHeight;
      calibrationFrames++;
      statusEl.textContent = `calibrating… ${calibrationFrames}/20`;
      return;
    } else {
      calibratedBase = calibrationSum / calibrationFrames;
      const sens = getSensitivity();
      downThreshold = calibratedBase * (1 + sens);  // face bigger/closer = down
      upThreshold   = calibratedBase * (1 - sens * 0.6); // slightly less strict to come back up
      statusEl.textContent = '✓ ready — do push-ups';
    }
  }

  // Rep detection: face gets larger (closer to camera) when going down
  const diff = (faceHeight - calibratedBase) / calibratedBase;
  const phaseFill = document.getElementById('phase-fill');

  if(phase === 'up' && faceHeight > downThreshold) {
    phase = 'down';
  } else if(phase === 'down' && faceHeight < calibratedBase) {
    phase = 'up';
    currentReps++;
    document.getElementById('rep-counter').textContent = currentReps;
    document.getElementById('w-total').textContent = sessionReps + currentReps;
    pulseCounter();
  }

  const pct = Math.min(100, Math.max(0, 50 + diff * 400));
  phaseFill.style.width = Math.round(pct) + '%';

  // Draw face mesh dots (subtle)
  ctx.fillStyle = phase === 'down' ? 'rgba(100,200,150,0.6)' : 'rgba(255,255,255,0.3)';
  for(const pt of lm) {
    const x = pt.x * canvasEl.width;
    const y = pt.y * canvasEl.height;
    ctx.beginPath();
    ctx.arc(x, y, 1.2, 0, Math.PI*2);
    ctx.fill();
  }
}

function pulseCounter() {
  const el = document.getElementById('rep-counter');
  el.style.transform = 'scale(1.25)';
  el.style.transition = 'transform .1s';
  setTimeout(() => { el.style.transform = 'scale(1)'; }, 150);
}

loadHistory();
updateIdleStats();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>push.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0c0c0c;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: #2a2a2a;
    --text: #f0ede8;
    --muted: #555;
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,0.12);
    --red: #ff5f5f;
    --radius: 16px;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }

  #app {
    max-width: 420px;
    margin: 0 auto;
    min-height: 100vh;
    padding: env(safe-area-inset-top, 20px) 1.25rem env(safe-area-inset-bottom, 20px);
    display: flex;
    flex-direction: column;
  }

  .screen { display: none; flex-direction: column; gap: 1rem; flex: 1; padding-top: 1rem; }
  .screen.active { display: flex; }

  /* ── Typography ── */
  .logotype { font-family: var(--mono); font-size: 28px; font-weight: 300; letter-spacing: -.02em; color: var(--text); }
  .sub { font-size: 13px; color: var(--muted); margin-top: 3px; font-family: var(--mono); }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
  }

  /* ── Stat grid ── */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-card {
    background: var(--surface2);
    border-radius: 12px;
    padding: .85rem 1rem;
    display: flex; flex-direction: column; gap: 4px;
  }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; font-family: var(--mono); }
  .stat-val { font-size: 26px; font-weight: 400; font-family: var(--mono); line-height: 1; }
  .stat-val sup { font-size: 13px; color: var(--muted); }

  /* ── Buttons ── */
  .btn {
    width: 100%; padding: 15px; border-radius: var(--radius);
    border: none; font-size: 15px; font-weight: 500; cursor: pointer;
    font-family: var(--sans); transition: transform .1s, opacity .1s;
    letter-spacing: .01em;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #0c0c0c; }
  .btn-primary:hover { opacity: .9; }
  .btn-ghost {
    background: transparent; color: var(--text);
    border: 0.5px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface); }
  .btn-pill {
    width: auto; padding: 7px 16px; border-radius: 40px;
    border: 0.5px solid var(--border); background: transparent;
    color: var(--muted); font-size: 12px; font-family: var(--mono);
    cursor: pointer; transition: color .15s, border-color .15s;
  }
  .btn-pill:hover { color: var(--text); border-color: #444; }

  /* ── Video ── */
  #video-wrap {
    position: relative; border-radius: var(--radius);
    overflow: hidden; background: #000; aspect-ratio: 3/4; width: 100%;
    border: 0.5px solid var(--border);
  }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; transform: scaleX(-1); }
  #cv { position: absolute; inset: 0; width: 100%; height: 100%; transform: scaleX(-1); }

  #status-pill {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(12,12,12,.8); color: var(--text); font-size: 11px;
    padding: 5px 14px; border-radius: 40px; white-space: nowrap;
    font-family: var(--mono); border: 0.5px solid var(--border);
    backdrop-filter: blur(8px);
  }

  #depth-dot {
    position: absolute; top: 14px; right: 14px;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--muted); transition: background .15s, transform .15s;
  }
  #depth-dot.active { background: var(--accent); transform: scale(1.4); }

  /* ── Rep counter ── */
  #rep-counter {
    font-family: var(--mono); font-size: 96px; font-weight: 300;
    text-align: center; line-height: 1;
    transition: transform .1s; color: var(--text);
  }
  #rep-label {
    font-size: 10px; color: var(--muted); text-align: center;
    margin-top: 4px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .1em;
  }

  /* ── Depth bar ── */
  .depth-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .depth-row span { font-size: 10px; color: var(--muted); font-family: var(--mono); min-width: 20px; }
  .depth-bar { flex: 1; height: 4px; border-radius: 2px; background: var(--surface2); overflow: hidden; }
  .depth-fill { height: 100%; border-radius: 2px; background: var(--accent); width: 0%; transition: width .07s; }

  /* ── Sensitivity ── */
  .sens-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .sens-row span { font-size: 11px; color: var(--muted); font-family: var(--mono); white-space: nowrap; }
  input[type=range] {
    flex: 1; height: 4px; border-radius: 2px; cursor: pointer;
    accent-color: var(--accent);
  }
  .sens-val { min-width: 16px; text-align: right; font-family: var(--mono); font-size: 13px; }

  /* ── History ── */
  .tab-row { display: flex; gap: 6px; }
  .tab { flex: 1; padding: 7px 4px; border-radius: 8px; border: 0.5px solid var(--border); background: transparent; color: var(--muted); font-size: 11px; cursor: pointer; font-family: var(--mono); transition: all .15s; }
  .tab.on { background: var(--surface); color: var(--text); border-color: #3a3a3a; }

  .hist-item { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 0.5px solid var(--border); }
  .hist-item:last-child { border-bottom: none; }
  .hist-reps { font-family: var(--mono); font-size: 16px; font-weight: 400; }
  .hist-meta { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: var(--mono); }
  .hist-badge {
    font-size: 10px; font-family: var(--mono); padding: 3px 8px;
    border-radius: 20px; background: var(--accent-dim); color: var(--accent);
    border: 0.5px solid rgba(200,240,96,.2);
  }

  /* ── Workout header ── */
  .w-header { display: flex; justify-content: space-between; align-items: center; }
  .set-chip { font-family: var(--mono); font-size: 12px; color: var(--muted); }

  /* ── Error ── */
  .err-box { background: rgba(255,95,95,.08); border: 0.5px solid rgba(255,95,95,.2); border-radius: 12px; padding: 1rem; font-size: 13px; color: var(--red); font-family: var(--mono); text-align: center; line-height: 1.6; }
</style>
</head>
<body>
<div id="app">

  <!-- IDLE SCREEN -->
  <div class="screen active" id="s-idle">
    <div>
      <div class="logotype">push.</div>
      <div class="sub">place phone flat · screen up · look down</div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">today</div><div class="stat-val" id="i-today">0</div></div>
      <div class="stat-card"><div class="stat-label">all time</div><div class="stat-val" id="i-all">0</div></div>
      <div class="stat-card"><div class="stat-label">best set</div><div class="stat-val" id="i-best">0</div></div>
      <div class="stat-card"><div class="stat-label">streak</div><div class="stat-val" id="i-streak">0<sup>d</sup></div></div>
    </div>
    <button class="btn btn-primary" onclick="startWorkout()">start workout</button>
    <button class="btn btn-ghost" onclick="goHist()">history</button>
    <div class="card">
      <div style="font-size:12px;font-family:var(--mono);color:var(--muted);margin-bottom:.5rem">detection sensitivity</div>
      <div class="sens-row">
        <span>low</span>
        <input type="range" id="sens" min="1" max="5" step="1" value="3" oninput="document.getElementById('sv').textContent=this.value">
        <span>high</span>
        <span class="sens-val" id="sv">3</span>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:8px;font-family:var(--mono)">higher = shallower reps count</div>
    </div>
  </div>

  <!-- WORKOUT SCREEN -->
  <div class="screen" id="s-workout">
    <div class="w-header">
      <div class="set-chip" id="set-lbl">set 1</div>
      <div style="display:flex;gap:8px">
        <button class="btn-pill" onclick="nextSet()">rest →</button>
        <button class="btn-pill" onclick="finishWorkout()" style="color:var(--accent);border-color:rgba(200,240,96,.3)">done ✓</button>
      </div>
    </div>
    <div id="video-wrap">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="cv"></canvas>
      <div id="depth-dot"></div>
      <div id="status-pill">loading detector…</div>
    </div>
    <div style="padding:.25rem 0">
      <div id="rep-counter">0</div>
      <div id="rep-label">reps this set</div>
      <div class="depth-row">
        <span>up</span>
        <div class="depth-bar"><div class="depth-fill" id="dfill"></div></div>
        <span>dn</span>
      </div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">session</div><div class="stat-val" id="w-sess">0</div></div>
      <div class="stat-card"><div class="stat-label">sets</div><div class="stat-val" id="w-sets">0</div></div>
    </div>
    <div id="cam-err" style="display:none"></div>
  </div>

  <!-- HISTORY SCREEN -->
  <div class="screen" id="s-hist">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="logotype" style="font-size:22px">history</div>
      <button class="btn-pill" onclick="goIdle()">← back</button>
    </div>
    <div class="tab-row">
      <button class="tab on" onclick="filterH('all',this)">all</button>
      <button class="tab" onclick="filterH('week',this)">week</button>
      <button class="tab" onclick="filterH('month',this)">month</button>
    </div>
    <div class="card" id="hist-list"></div>
  </div>

</div>

<!-- TF.js + BlazeFace via unpkg (stable, versioned) -->
<script src="https://unpkg.com/@tensorflow/tfjs-core@4.17.0/dist/tf-core.min.js"></script>
<script src="https://unpkg.com/@tensorflow/tfjs-backend-webgl@4.17.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://unpkg.com/@tensorflow-models/blazeface@0.0.7/dist/blazeface.min.js"></script>

<script>
const KEY = 'push_v3';
let hist = [];
let curReps = 0, curSet = 1, sessReps = 0, setsDone = 0;
let stream = null, rafId = null, model = null;
let running = false;
let baseArea = null, calibN = 0, calibSum = 0;
let phase = 'up';
let vidEl, cvEl, cx;

/* ── Storage ── */
function load() { try { hist = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch { hist = []; } }
function save() { try { localStorage.setItem(KEY, JSON.stringify(hist)); } catch {} }
function todayStr() { return new Date().toISOString().slice(0, 10); }

/* ── Idle stats ── */
function refreshIdle() {
  const t = todayStr();
  const todayR = hist.filter(h => h.date === t).reduce((a, h) => a + h.reps, 0);
  const allR = hist.reduce((a, h) => a + h.reps, 0);
  const best = hist.reduce((a, h) => Math.max(a, h.reps), 0);
  let streak = 0;
  const days = new Set(hist.map(h => h.date));
  for (let d = new Date(); days.has(d.toISOString().slice(0,10)); d.setDate(d.getDate()-1)) streak++;
  document.getElementById('i-today').textContent = todayR;
  document.getElementById('i-all').textContent = allR;
  document.getElementById('i-best').textContent = best;
  document.getElementById('i-streak').innerHTML = streak + '<sup>d</sup>';
}

/* ── Screen nav ── */
function go(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function goIdle() { stopCam(); go('s-idle'); refreshIdle(); }
function goHist() { renderHist('all'); go('s-hist'); }

/* ── History ── */
function filterH(f, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderHist(f);
}
function renderHist(f) {
  const el = document.getElementById('hist-list');
  let entries = [...hist].reverse();
  const now = new Date();
  if (f === 'week') { const w = new Date(now); w.setDate(w.getDate()-7); entries = entries.filter(h => new Date(h.date) >= w); }
  if (f === 'month') { const m = new Date(now); m.setDate(m.getDate()-30); entries = entries.filter(h => new Date(h.date) >= m); }
  if (!entries.length) { el.innerHTML = '<div style="font-size:12px;color:var(--muted);font-family:var(--mono)">no workouts yet</div>'; return; }
  el.innerHTML = entries.map(h => `
    <div class="hist-item">
      <div>
        <div class="hist-reps">${h.reps} reps</div>
        <div class="hist-meta">${h.date} · set ${h.set}</div>
      </div>
      <div class="hist-badge">${h.reps >= 20 ? '🔥' : h.reps >= 10 ? '💪' : '✓'}</div>
    </div>`).join('');
}

/* ── Workout flow ── */
async function startWorkout() {
  curReps = 0; curSet = 1; sessReps = 0; setsDone = 0;
  resetCalib(); phase = 'up';
  updateW();
  go('s-workout');
  document.getElementById('cam-err').style.display = 'none';
  await initCam();
}

function nextSet() {
  if (curReps > 0) { hist.push({ date: todayStr(), set: curSet, reps: curReps }); save(); sessReps += curReps; setsDone++; }
  curSet++; curReps = 0; resetCalib(); phase = 'up';
  updateW();
}

function finishWorkout() {
  if (curReps > 0) { hist.push({ date: todayStr(), set: curSet, reps: curReps }); save(); }
  goIdle();
}

function resetCalib() { baseArea = null; calibN = 0; calibSum = 0; }

function updateW() {
  document.getElementById('rep-counter').textContent = curReps;
  document.getElementById('set-lbl').textContent = 'set ' + curSet;
  document.getElementById('w-sess').textContent = sessReps + curReps;
  document.getElementById('w-sets').textContent = setsDone;
}

/* ── Camera ── */
async function initCam() {
  vidEl = document.getElementById('video');
  cvEl = document.getElementById('cv');
  cx = cvEl.getContext('2d');

  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }, audio: false });
    vidEl.srcObject = stream;
    await new Promise(r => { vidEl.onloadedmetadata = r; });
    cvEl.width = vidEl.videoWidth;
    cvEl.height = vidEl.videoHeight;
    setStatus('loading model…');
    await tf.setBackend('webgl');
    await tf.ready();
    model = await blazeface.load();
    setStatus('calibrating…');
    running = true;
    loop();
  } catch (e) {
    const errEl = document.getElementById('cam-err');
    errEl.style.display = 'block';
    errEl.innerHTML = `<div class="err-box">camera error: ${e.message}<br><br>make sure you've allowed camera access in your browser settings.</div>`;
    setStatus('error');
  }
}

function stopCam() {
  running = false;
  if (rafId) cancelAnimationFrame(rafId);
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null; model = null; rafId = null;
}

function setStatus(msg) { const el = document.getElementById('status-pill'); if (el) el.textContent = msg; }

function getSens() { return 0.04 + (parseInt(document.getElementById('sens').value) - 1) * 0.013; }

async function loop() {
  if (!running || !model) return;
  if (vidEl.readyState >= 2) {
    try {
      const preds = await model.estimateFaces(vidEl, false);
      cx.clearRect(0, 0, cvEl.width, cvEl.height);
      if (preds.length > 0) {
        const p = preds[0];
        const [x1, y1] = p.topLeft;
        const [x2, y2] = p.bottomRight;
        const w = x2 - x1, h = y2 - y1;
        const area = w * h;

        // Calibration
        if (baseArea === null) {
          calibN++; calibSum += area;
          setStatus(`calibrating… ${Math.min(calibN, 20)}/20`);
          if (calibN >= 20) { baseArea = calibSum / calibN; setStatus('✓ go!'); }
        } else {
          const ratio = area / baseArea;
          const sens = getSens();
          const pct = Math.round(Math.min(100, Math.max(0, (ratio - 0.6) / 1.0 * 100)));
          document.getElementById('dfill').style.width = pct + '%';

          const dot = document.getElementById('depth-dot');
          if (phase === 'up' && ratio > 1 + sens) {
            phase = 'down'; dot.classList.add('active');
          } else if (phase === 'down' && ratio < 1 - sens * 0.4) {
            phase = 'up'; dot.classList.remove('active');
            curReps++;
            updateW();
            pulse();
          }
          setStatus(phase === 'down' ? '⬇ hold' : '⬆ push up');
        }

        // Draw bounding box
        cx.strokeStyle = phase === 'down' ? '#c8f060' : 'rgba(255,255,255,0.3)';
        cx.lineWidth = 1.5;
        cx.strokeRect(x1, y1, w, h);

        // Draw keypoints
        if (p.landmarks) {
          cx.fillStyle = phase === 'down' ? '#c8f060' : 'rgba(255,255,255,0.5)';
          for (const [lx, ly] of p.landmarks) {
            cx.beginPath(); cx.arc(lx, ly, 3, 0, Math.PI * 2); cx.fill();
          }
        }
      } else {
        setStatus('look into camera');
        document.getElementById('depth-dot').classList.remove('active');
      }
    } catch (e) { /* skip frame */ }
  }
  rafId = requestAnimationFrame(loop);
}

function pulse() {
  const el = document.getElementById('rep-counter');
  el.style.transform = 'scale(1.25)';
  setTimeout(() => el.style.transform = 'scale(1)', 120);
}

load(); refreshIdle();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>push.</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a0a;color:#f0f0f0;min-height:100vh}
#app{display:flex;flex-direction:column;min-height:100vh;padding:1.25rem;max-width:420px;margin:0 auto}
.screen{display:none;flex-direction:column;gap:1rem;flex:1}
.screen.active{display:flex}

.card{background:#1a1a1a;border:0.5px solid #2a2a2a;border-radius:14px;padding:1rem 1.25rem}

.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.stat-card{background:#141414;border-radius:10px;padding:.9rem;text-align:center}
.stat-label{font-size:11px;color:#666;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.stat-val{font-size:24px;font-weight:500;color:#f0f0f0}

.btn{width:100%;padding:14px;border-radius:14px;border:none;font-size:15px;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn-primary{background:#f0f0f0;color:#0a0a0a}
.btn-primary:hover{opacity:.88}
.btn-secondary{background:transparent;color:#f0f0f0;border:0.5px solid #2a2a2a;margin-top:.25rem}
.btn-secondary:hover{background:#1a1a1a}
.btn-sm{width:auto;padding:7px 16px;border-radius:20px;border:0.5px solid #2a2a2a;background:transparent;color:#aaa;font-size:13px;cursor:pointer}
.btn-sm:hover{background:#1a1a1a;color:#f0f0f0}

#video-wrap{position:relative;border-radius:14px;overflow:hidden;background:#111;aspect-ratio:3/4;width:100%}
video{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1)}
canvas{position:absolute;inset:0;width:100%;height:100%;transform:scaleX(-1)}
#face-status{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;font-size:12px;padding:5px 14px;border-radius:20px;white-space:nowrap;backdrop-filter:blur(4px)}
#phase-indicator{position:absolute;top:12px;right:12px;width:12px;height:12px;border-radius:50%;background:#333;transition:background .2s}
#phase-indicator.down{background:#4ade80}

#rep-counter{font-size:80px;font-weight:300;text-align:center;line-height:1;transition:transform .12s;color:#f0f0f0}
#rep-label{font-size:12px;color:#555;text-align:center;margin-top:2px;text-transform:uppercase;letter-spacing:.05em}

.depth-bar-wrap{display:flex;align-items:center;gap:10px;margin-top:.5rem}
.depth-bar-wrap span{font-size:11px;color:#555;min-width:24px;text-align:center}
.depth-bar{flex:1;height:6px;border-radius:3px;background:#1a1a1a;overflow:hidden}
.depth-fill{height:100%;border-radius:3px;background:#f0f0f0;transition:width .08s;width:0%}

.hist-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid #1e1e1e}
.hist-item:last-child{border-bottom:none}
.hist-meta{font-size:12px;color:#555;margin-top:2px}
.hist-reps-val{font-size:15px;font-weight:500}

.tab-row{display:flex;gap:6px}
.tab-btn{flex:1;padding:7px;border-radius:8px;border:0.5px solid #222;background:transparent;color:#666;font-size:12px;cursor:pointer}
.tab-btn.active{background:#1a1a1a;color:#f0f0f0;border-color:#333}

.sens-row{display:flex;align-items:center;gap:10px;margin-top:.5rem}
.sens-row label{font-size:12px;color:#555;white-space:nowrap}
.sens-row input[type=range]{flex:1;accent-color:#f0f0f0}
.sens-row span{font-size:13px;font-weight:500;min-width:16px;text-align:right}

.section-head{display:flex;justify-content:space-between;align-items:center}
.section-title{font-size:22px;font-weight:500}
.section-sub{font-size:13px;color:#555;margin-top:2px}

.set-row{display:flex;justify-content:space-between;align-items:center}
.set-info{font-size:13px;color:#555}
</style>
</head>
<body>
<div id="app">

<!-- IDLE -->
<div class="screen active" id="screen-idle">
  <div style="padding:.25rem 0 .5rem">
    <div class="section-title">push.</div>
    <div class="section-sub">place your phone flat, screen up</div>
  </div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">today</div><div class="stat-val" id="s-today">0</div></div>
    <div class="stat-card"><div class="stat-label">all time</div><div class="stat-val" id="s-alltime">0</div></div>
    <div class="stat-card"><div class="stat-label">best set</div><div class="stat-val" id="s-best">0</div></div>
    <div class="stat-card"><div class="stat-label">streak</div><div class="stat-val" id="s-streak">0<span style="font-size:13px;color:#555">d</span></div></div>
  </div>
  <button class="btn btn-primary" onclick="startWorkout()">start workout</button>
  <button class="btn btn-secondary" onclick="goHistory()">view history</button>
  <div class="card">
    <div style="font-size:13px;font-weight:500;margin-bottom:.5rem">detection sensitivity</div>
    <div class="sens-row">
      <label>low</label>
      <input type="range" id="sens" min="1" max="5" step="1" value="3" oninput="document.getElementById('sens-out').textContent=this.value">
      <label>high</label>
      <span id="sens-out">3</span>
    </div>
    <div style="font-size:11px;color:#444;margin-top:8px">higher = counts reps at shallower depth</div>
  </div>
</div>

<!-- WORKOUT -->
<div class="screen" id="screen-workout">
  <div class="set-row">
    <div class="set-info" id="set-label">set 1</div>
    <div style="display:flex;gap:8px">
      <button class="btn-sm" onclick="nextSet()">rest →</button>
      <button class="btn-sm" onclick="finishWorkout()">done</button>
    </div>
  </div>
  <div id="video-wrap">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="cv"></canvas>
    <div id="phase-indicator"></div>
    <div id="face-status">looking for face…</div>
  </div>
  <div>
    <div id="rep-counter">0</div>
    <div id="rep-label">reps this set</div>
    <div class="depth-bar-wrap">
      <span>up</span>
      <div class="depth-bar"><div class="depth-fill" id="depth-fill"></div></div>
      <span>down</span>
    </div>
  </div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">session total</div><div class="stat-val" id="w-total">0</div></div>
    <div class="stat-card"><div class="stat-label">sets done</div><div class="stat-val" id="w-sets">0</div></div>
  </div>
</div>

<!-- HISTORY -->
<div class="screen" id="screen-history">
  <div class="section-head">
    <div class="section-title">history</div>
    <button class="btn-sm" onclick="goIdle()">← back</button>
  </div>
  <div class="tab-row">
    <button class="tab-btn active" onclick="filterHist('all',this)">all time</button>
    <button class="tab-btn" onclick="filterHist('week',this)">this week</button>
    <button class="tab-btn" onclick="filterHist('month',this)">this month</button>
  </div>
  <div class="card" id="hist-list"></div>
</div>

</div>
<script>
const STORAGE_KEY='pushr_v2';
let hist=[];
let curReps=0,curSet=1,sessReps=0,setsDone=0;
let stream=null,rafId=null,faceMesh=null;
let isRunning=false;
let calibFrames=0,calibSum=0,baseSize=null;
let repPhase='up';
let videoEl,canvasEl,ctx2d;

function loadHist(){try{const r=localStorage.getItem(STORAGE_KEY);hist=r?JSON.parse(r):[]}catch{hist=[]}}
function saveHist(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(hist))}catch{}}
function today(){return new Date().toISOString().slice(0,10)}

function updateIdleStats(){
  const t=today();
  const todayReps=hist.filter(h=>h.date===t).reduce((a,h)=>a+h.reps,0);
  const allTime=hist.reduce((a,h)=>a+h.reps,0);
  const best=hist.reduce((a,h)=>Math.max(a,h.reps),0);
  let streak=0,d=new Date();
  const days=new Set(hist.map(h=>h.date));
  while(days.has(d.toISOString().slice(0,10))){streak++;d.setDate(d.getDate()-1)}
  document.getElementById('s-today').textContent=todayReps;
  document.getElementById('s-alltime').textContent=allTime;
  document.getElementById('s-best').textContent=best;
  document.getElementById('s-streak').innerHTML=streak+'<span style="font-size:13px;color:#555">d</span>';
}

function goScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goIdle(){stopCamera();goScreen('screen-idle');updateIdleStats()}
function goHistory(){renderHist('all');goScreen('screen-history')}

function filterHist(f,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderHist(f);
}
function renderHist(f){
  const el=document.getElementById('hist-list');
  let entries=[...hist].reverse();
  if(f==='week'){const w=new Date();w.setDate(w.getDate()-7);entries=entries.filter(h=>new Date(h.date)>=w)}
  if(f==='month'){const m=new Date();m.setDate(m.getDate()-30);entries=entries.filter(h=>new Date(h.date)>=m)}
  if(!entries.length){el.innerHTML='<p style="font-size:13px;color:#555">no workouts yet</p>';return}
  el.innerHTML=entries.map(h=>`
    <div class="hist-item">
      <div>
        <div class="hist-reps-val">${h.reps} reps</div>
        <div class="hist-meta">${h.date} · set ${h.set}</div>
      </div>
      <div style="font-size:11px;color:#444">${h.duration ? h.duration+'s' : ''}</div>
    </div>`).join('');
}

async function startWorkout(){
  curReps=0;curSet=1;sessReps=0;setsDone=0;
  resetCalib();repPhase='up';
  updateWUI();
  goScreen('screen-workout');
  await initCamera();
}

function nextSet(){
  if(curReps>0){hist.push({date:today(),set:curSet,reps:curReps});saveHist();sessReps+=curReps;setsDone++}
  curSet++;curReps=0;resetCalib();repPhase='up';
  updateWUI();
}

function finishWorkout(){
  if(curReps>0){hist.push({date:today(),set:curSet,reps:curReps});saveHist()}
  stopCamera();goIdle();
}

function resetCalib(){calibFrames=0;calibSum=0;baseSize=null}

function updateWUI(){
  document.getElementById('rep-counter').textContent=curReps;
  document.getElementById('set-label').textContent='set '+curSet;
  document.getElementById('w-total').textContent=sessReps+curReps;
  document.getElementById('w-sets').textContent=setsDone;
}

async function initCamera(){
  videoEl=document.getElementById('video');
  canvasEl=document.getElementById('cv');
  ctx2d=canvasEl.getContext('2d');
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:false});
    videoEl.srcObject=stream;
    await new Promise(r=>videoEl.onloadedmetadata=r);
    canvasEl.width=videoEl.videoWidth;
    canvasEl.height=videoEl.videoHeight;
    isRunning=true;
    loadFaceMesh();
  }catch(e){
    document.getElementById('face-status').textContent='⚠ camera permission denied';
  }
}

function loadFaceMesh(){
  const s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js';
  s.onload=()=>{
    faceMesh=new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/${f}`});
    faceMesh.setOptions({maxNumFaces:1,refineLandmarks:false,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
    faceMesh.onResults(onFaceResults);
    tick();
  };
  s.onerror=()=>fallbackToProximity();
  document.head.appendChild(s);
}

function fallbackToProximity(){
  document.getElementById('face-status').textContent='using proximity mode — nose close = down';
  proximityMode();
}

function proximityMode(){
  if(!isRunning)return;
  const ctx=canvasEl.getContext('2d');
  ctx.clearRect(0,0,canvasEl.width,canvasEl.height);
  rafId=requestAnimationFrame(proximityMode);
}

async function tick(){
  if(!isRunning||!faceMesh)return;
  if(videoEl.readyState>=2)await faceMesh.send({image:videoEl});
  rafId=requestAnimationFrame(tick);
}

function getSens(){return 0.038+(parseInt(document.getElementById('sens').value)-1)*0.014}

function onFaceResults(res){
  if(!ctx2d)return;
  ctx2d.clearRect(0,0,canvasEl.width,canvasEl.height);
  const statusEl=document.getElementById('face-status');
  const phaseEl=document.getElementById('phase-indicator');

  if(!res.multiFaceLandmarks||!res.multiFaceLandmarks.length){
    statusEl.textContent='no face — look into camera';
    phaseEl.classList.remove('down');
    return;
  }

  const lm=res.multiFaceLandmarks[0];
  const nose=lm[1],forehead=lm[10],chin=lm[152],leftEar=lm[234],rightEar=lm[454];

  // Multi-metric depth estimation for angle robustness
  const faceH=Math.abs(chin.y-forehead.y)*canvasEl.height;
  const faceW=Math.abs(leftEar.x-rightEar.x)*canvasEl.width;
  const faceArea=faceH*faceW;

  const sens=getSens();

  if(baseSize===null){
    if(calibFrames<25){
      calibSum+=faceArea;calibFrames++;
      statusEl.textContent=`calibrating… ${calibFrames}/25`;
      return;
    } else {
      baseSize=calibSum/calibFrames;
      statusEl.textContent='✓ go!';
    }
  }

  const ratio=faceArea/baseSize;
  const pct=Math.min(100,Math.max(0,Math.round((ratio-0.7)/0.9*100)));
  document.getElementById('depth-fill').style.width=pct+'%';

  const downThr=1+sens;
  const upThr=1-sens*0.5;

  if(repPhase==='up'&&ratio>downThr){
    repPhase='down';
    phaseEl.classList.add('down');
  } else if(repPhase==='down'&&ratio<upThr){
    repPhase='up';
    phaseEl.classList.remove('down');
    curReps++;
    updateWUI();
    pulseCtr();
  }

  // Draw subtle mesh
  ctx2d.fillStyle=repPhase==='down'?'rgba(74,222,128,0.5)':'rgba(255,255,255,0.25)';
  for(const p of lm){
    ctx2d.beginPath();
    ctx2d.arc(p.x*canvasEl.width,p.y*canvasEl.height,1.3,0,Math.PI*2);
    ctx2d.fill();
  }

  if(calibFrames>=25) statusEl.textContent=repPhase==='down'?'⬇ hold…':'⬆ push up';
}

function pulseCtr(){
  const el=document.getElementById('rep-counter');
  el.style.transform='scale(1.3)';
  setTimeout(()=>el.style.transform='scale(1)',130);
}

function stopCamera(){
  isRunning=false;
  if(rafId)cancelAnimationFrame(rafId);
  if(stream)stream.getTracks().forEach(t=>t.stop());
  stream=null;faceMesh=null;
}

loadHist();updateIdleStats();
</script>
</body>
</html>
